name: Deploy VitePress to Pages and Server

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # 2. 设置 pnpm
      - uses: pnpm/action-setup@v4
        with:
          version: 8.6.10

      # 3. 设置 Node
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      # 4. 安装依赖
      - name: Install dependencies
        run: pnpm install

      # 5. 构建站点
      - name: Build with VitePress
        run: pnpm docs:build

      # 6. 【新增】调试：确认 dist 目录结构
      - name: Check dist structure
        run: |
          echo "=== 检查构建产物 ==="
          ls -R docs/.vitepress/dist
          echo "==================="

      # 7. 【新增】部署到远程服务器 (SSH)
      # 此时 dist 目录就在 docs/.vitepress/dist，直接使用
      - name: Deploy to Remote Server
        uses: easingthemes/ssh-deploy@v4
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          # 源路径：直接指向构建生成的目录内容
          SOURCE: "docs/.vitepress/dist/" 
          TARGET: "/www/wwwroot/ryw_yun_project/wgg_project" 
          ARGS: "-avz --delete"

      # 9. 上传 artifact 供 GitHub Pages 部署使用
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  # 部署到 GitHub Pages 任务 (必须依赖上面的 build 完成)
  deploy-github:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build-and-deploy
    runs-on: ubuntu-latest
    name: Deploy to GitHub Pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4