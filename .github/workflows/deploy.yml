name: Deploy VitePress to Pages and Server

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # 2. 设置 pnpm
      - uses: pnpm/action-setup@v4
        with:
          version: 8.6.10

      # 3. 设置 Node
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      # 4. 安装依赖
      - name: Install dependencies
        run: pnpm install

      # 5. 构建站点
      - name: Build with VitePress
        run: pnpm docs:build

      # 6. 【新增】调试：检查构建产物和secrets
      - name: Debug Build and Secrets
        run: |
          echo "=== 检查构建产物 ==="
          ls -la docs/.vitepress/dist/
          echo "=== 调试secrets值 ==="
          echo "SSH_PRIVATE_KEY 长度: ${#SSH_PRIVATE_KEY}"
          echo "SSH_HOST: $SSH_HOST"
          echo "SSH_USER: $SSH_USER"
          echo "SSH_PRIVATE_KEY 前50字符: ${SSH_PRIVATE_KEY:0:50}"
          echo "SSH_PRIVATE_KEY 后50字符: ${SSH_PRIVATE_KEY: -50}"
          echo "=================="
          
          # 检查SSH密钥格式
          echo "=== 检查SSH密钥格式 ==="
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/test_key
          chmod 600 ~/.ssh/test_key
          
          # 测试密钥格式
          if ssh-keygen -l -f ~/.ssh/test_key >/dev/null 2>&1; then
            echo "✅ SSH密钥格式正确"
            ssh-keygen -l -f ~/.ssh/test_key
          else
            echo "❌ SSH密钥格式错误"
            echo "密钥内容预览:"
            head -n 3 ~/.ssh/test_key
            echo "..."
            tail -n 3 ~/.ssh/test_key
          fi
          echo "=================="
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}

      # 7. 【新增】调试：测试SSH连接
      - name: Debug SSH Connection
        run: |
          echo "=== 测试SSH连接 ==="
          # 创建临时私钥文件并测试连接
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key $SSH_USER@$SSH_HOST "echo 'SSH连接成功'; ls -la $TARGET_DIR" || echo "SSH连接失败"
          echo "=================="
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          TARGET_DIR: "/www/wwwroot/ryw_yun_project/wgg_project"

      # 8. 【新增】调试：手动测试rsync部署
      - name: Debug Manual Rsync
        run: |
          echo "=== 手动测试rsync部署 ==="
          # 创建临时私钥文件
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts
          
          # 检查源目录内容
          echo "源目录内容:"
          ls -la $SOURCE_DIR
          
          # 测试rsync命令
          echo "测试rsync命令:"
          rsync $RSYNC_ARGS -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key" $SOURCE_DIR $SSH_USER@$SSH_HOST:$TARGET_DIR --dry-run -vv
          
          echo "=================="
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SOURCE_DIR: "docs/.vitepress/dist/"
          TARGET_DIR: "/www/wwwroot/ryw_yun_project/wgg_project"
          RSYNC_ARGS: "-avz --delete"

      # 9. 【新增】修复SSH密钥格式（如果需要）
      - name: Fix SSH Key Format
        run: |
          echo "=== 修复SSH密钥格式 ==="
          mkdir -p ~/.ssh
          
          # 清理密钥中的换行符和空格
          CLEAN_KEY=$(echo "$SSH_PRIVATE_KEY" | tr -d '\r' | sed 's/^[ \t]*//;s/[ \t]*$//')
          echo "$CLEAN_KEY" > ~/.ssh/fixed_key
          chmod 600 ~/.ssh/fixed_key
          
          # 验证修复后的密钥
          if ssh-keygen -l -f ~/.ssh/fixed_key >/dev/null 2>&1; then
            echo "✅ 修复后的SSH密钥格式正确"
            ssh-keygen -l -f ~/.ssh/fixed_key
            # 导出修复后的密钥供后续步骤使用
            echo "$CLEAN_KEY" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
          else
            echo "❌ 无法修复SSH密钥格式"
            echo "请检查GitHub Secrets中的SSH_PRIVATE_KEY格式"
            exit 1
          fi
          echo "=================="
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}

      # 10. 【新增】使用修复后的密钥手动部署到远程服务器
      - name: Deploy to Remote Server
        run: |
          echo "=== 开始手动部署 ==="
          
          # 使用修复后的密钥进行rsync部署
          rsync -avz --delete -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/fixed_key" \
            docs/.vitepress/dist/ \
            $SSH_USER@$SSH_HOST:/www/wwwroot/ryw_yun_project/wgg_project/
          
          # 检查部署结果
          if [ $? -eq 0 ]; then
            echo "✅ 部署成功"
          else
            echo "❌ 部署失败"
            exit 1
          fi
          echo "=================="
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}

      # 10. 【新增】调试：验证部署结果
      - name: Verify Deployment
        run: |
          echo "=== 验证部署结果 ==="
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts
          
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key $SSH_USER@$SSH_HOST "
            echo '远程目录内容:';
            ls -la $TARGET_DIR;
            echo '检查index.html:';
            ls -la $TARGET_DIR/index.html 2>/dev/null || echo 'index.html不存在';
            echo '检查文件数量:';
            find $TARGET_DIR -type f | wc -l;
          "
          echo "=================="
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          TARGET_DIR: "/www/wwwroot/ryw_yun_project/wgg_project"

      # 7. 上传 artifact 供 GitHub Pages 部署使用
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  # 部署到 GitHub Pages 任务 (依赖上面的 build 完成)
  deploy-github:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build-and-deploy
    runs-on: ubuntu-latest
    name: Deploy to GitHub Pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4