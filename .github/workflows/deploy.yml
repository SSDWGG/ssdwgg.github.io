name: Deploy VitePress to Pages and Server

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # 2. 设置 pnpm
      - uses: pnpm/action-setup@v4
        with:
          version: 8.6.10

      # 3. 设置 Node
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      # 4. 安装依赖
      - name: Install dependencies
        run: pnpm install

      # 5. 构建站点
      - name: Build with VitePress
        run: pnpm docs:build

      # 6. 【新增】调试：检查构建产物和secrets
      - name: Debug Build and Secrets
        run: |
          echo "=== 检查构建产物 ==="
          ls -la docs/.vitepress/dist/
          echo "=== 调试secrets值 ==="
          echo "SSH_PRIVATE_KEY 长度: ${#SSH_PRIVATE_KEY}"
          echo "SSH_HOST: $SSH_HOST"
          echo "SSH_USER: $SSH_USER"
          echo "SSH_PRIVATE_KEY 前50字符: ${SSH_PRIVATE_KEY:0:50}"
          echo "SSH_PRIVATE_KEY 后50字符: ${SSH_PRIVATE_KEY: -50}"
          echo "=================="
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}

      # 7. 【新增】调试：测试SSH连接
      - name: Debug SSH Connection
        run: |
          echo "=== 测试SSH连接 ==="
          # 创建临时私钥文件并测试连接
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key $SSH_USER@$SSH_HOST "echo 'SSH连接成功'; ls -la $TARGET_DIR" || echo "SSH连接失败"
          echo "=================="
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          TARGET_DIR: "/www/wwwroot/ryw_yun_project/wgg_project"

      # 8. 【新增】调试：手动测试rsync部署
      - name: Debug Manual Rsync
        run: |
          echo "=== 手动测试rsync部署 ==="
          # 创建临时私钥文件
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts
          
          # 检查源目录内容
          echo "源目录内容:"
          ls -la $SOURCE_DIR
          
          # 测试rsync命令
          echo "测试rsync命令:"
          rsync $RSYNC_ARGS -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key" $SOURCE_DIR $SSH_USER@$SSH_HOST:$TARGET_DIR --dry-run -vv
          
          echo "=================="
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SOURCE_DIR: "docs/.vitepress/dist/"
          TARGET_DIR: "/www/wwwroot/ryw_yun_project/wgg_project"
          RSYNC_ARGS: "-avz --delete"

      # 9. 【新增】部署到远程服务器 (SSH)
      # 此时 dist 目录就在 docs/.vitepress/dist，直接使用
      - name: Deploy to Remote Server
        uses: easingthemes/ssh-deploy@v4
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          # 源路径：直接指向构建生成的目录内容
          SOURCE: "docs/.vitepress/dist/" 
          TARGET: "/www/wwwroot/ryw_yun_project/wgg_project" 
          ARGS: "-avz --delete"
          # 添加详细日志输出
          EXTRA_RSYNC_ARGS: "-vv"

      # 10. 【新增】调试：验证部署结果
      - name: Verify Deployment
        run: |
          echo "=== 验证部署结果 ==="
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts
          
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key $SSH_USER@$SSH_HOST "
            echo '远程目录内容:';
            ls -la $TARGET_DIR;
            echo '检查index.html:';
            ls -la $TARGET_DIR/index.html 2>/dev/null || echo 'index.html不存在';
            echo '检查文件数量:';
            find $TARGET_DIR -type f | wc -l;
          "
          echo "=================="
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          TARGET_DIR: "/www/wwwroot/ryw_yun_project/wgg_project"

      # 7. 上传 artifact 供 GitHub Pages 部署使用
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  # 部署到 GitHub Pages 任务 (依赖上面的 build 完成)
  deploy-github:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build-and-deploy
    runs-on: ubuntu-latest
    name: Deploy to GitHub Pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4